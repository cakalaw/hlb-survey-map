const map = L.map("map").setView([13.932, 121.345], 12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "\u00a9 OpenStreetMap contributors", maxZoom: 19
}).addTo(map);

function style(name) {
  const info = HLB[name];
  return info
    ? { color: info.border, weight: 2, fillColor: info.fill, fillOpacity: 0.72, opacity: 1 }
    : { color: "#5F5E5A", weight: 0.8, fillColor: "#7A7873", fillOpacity: 0.5, opacity: 0.9 };
}

const panel = document.getElementById("panel");
let activeLayer = null;

L.geoJSON(GEOJSON, {
  style: f => style(f.properties.name),
  onEachFeature: (f, layer) => {
    const name = f.properties.name;
    const info = HLB[name];

    layer.on("mouseover", function(e) {
      if (activeLayer !== this) {
        if (info) this.setStyle({ fillOpacity: 0.9, weight: 2.5 });
        else this.setStyle({ fillOpacity: 0.65, weight: 1.2 });
      }
      const tt = document.getElementById("tooltip");
      if (info) {
        const pct = info.pct % 1 === 0 ? info.pct + "%" : info.pct.toFixed(2) + "%";
        const RISK_COLOR = { CRITICAL:"#FF8A80", SEVERE:"#FFAB76", HIGH:"#FFD180", MODERATE:"#FFE57F" };
        const rc = RISK_COLOR[info.risk] || "#fff";
        tt.innerHTML = `
          <div class="tt-name">${name}</div>
          <div class="tt-pct" style="color:${rc};">${pct} positive</div>
          <div class="tt-row">${info.pos} of ${info.total} pooled samples | ${info.crop}</div>
          <div class="tt-row" style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.15);">${info.farms}</div>
          <div class="tt-row" style="opacity:0.6;margin-top:3px;font-style:italic;">Click for full details</div>`;
      } else {
        tt.innerHTML = `<div class="tt-name">${name}</div><div class="tt-unsurveyed">Not surveyed</div>`;
      }
      tt.style.display = "block";
      const x = e.originalEvent.clientX, y = e.originalEvent.clientY;
      tt.style.left = (x + 14) + "px";
      tt.style.top  = (y - 10) + "px";
    });
    layer.on("mousemove", function(e) {
      const tt = document.getElementById("tooltip");
      const x = e.originalEvent.clientX, y = e.originalEvent.clientY;
      const tw = tt.offsetWidth, th = tt.offsetHeight;
      const wx = window.innerWidth, wy = window.innerHeight;
      tt.style.left = (x + 14 + tw > wx ? x - tw - 14 : x + 14) + "px";
      tt.style.top  = (y - 10 + th > wy ? y - th + 10 : y - 10) + "px";
    });
    layer.on("mouseout", function() {
      if (activeLayer !== this) this.setStyle(style(name));
      document.getElementById("tooltip").style.display = "none";
    });
    layer.on("click", function() {
      if (activeLayer && activeLayer !== this) activeLayer.setStyle(style(activeLayer.feature.properties.name));
      activeLayer = this;
      this.setStyle({ color: "#fff", weight: 3, fillOpacity: 0.92 });
      showPanel(name, info);
    });

    if (info) {
      const center = layer.getBounds().getCenter();
      const pct = info.pct % 1 === 0 ? info.pct + "%" : info.pct.toFixed(2) + "%";
      L.marker(center, {
        icon: L.divIcon({
          className: "",
          html: `<div style="text-align:center;pointer-events:none;white-space:nowrap;">
            <div style="font-size:13px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.95),0 0 6px rgba(0,0,0,0.7);">${pct}</div>
          </div>`,
          iconSize: [70, 18], iconAnchor: [35, 9]
        }),
        interactive: false
      }).addTo(map);
    }
  }
}).addTo(map);

// Dissolve all barangays into a single Tiaong municipality outline
try {
  let boundary = GEOJSON.features[0];
  for (let i = 1; i < GEOJSON.features.length; i++) {
    boundary = turf.union(boundary, GEOJSON.features[i]);
  }
  L.geoJSON(boundary, {
    style: { color: "#1a1a1a", weight: 3.5, fillOpacity: 0, opacity: 1 },
    interactive: false
  }).addTo(map);
} catch(e) { console.warn("Boundary dissolve failed:", e); }

function showPanel(name, info) {
  if (!info) {
    panel.innerHTML = `<strong>${name}</strong> &mdash; not surveyed in the 2025 HLB PCR study.`;
    return;
  }
  const rc = RISK_COLOR[info.risk] || "#333";
  const pct = info.pct % 1 === 0 ? info.pct : info.pct.toFixed(2);
  panel.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="width:14px;height:14px;border-radius:3px;background:${info.fill};border:1px solid ${info.border};display:inline-block;"></span>
      <strong style="font-size:14px;color:#222;">${name}</strong>
      <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:${rc}22;color:${rc};border:1px solid ${rc}44;">${info.risk}</span>
    </div>
    <div><span style="font-size:15px;font-weight:700;color:${rc};">${info.pos}/${info.total} pooled samples = ${pct}%</span> <span style="font-size:11px;color:#888;">(1 sample = 3 pooled trees)</span></div>
    <div style="color:#555;"><strong>Crop:</strong> ${info.crop} &nbsp;|&nbsp; <strong>Farms:</strong> ${info.farms}</div>
    <div style="color:${rc};font-style:italic;">${info.note}</div>`;
}
</script>
